# Baseline benchmark — LLaMA 3.2 11B Vision-Instruct (no SFT, no adapter).
model_name: meta-llama/Llama-3.2-11B-Vision-Instruct
quant_mode: 4bit
training_mode: lora
batch_size: 1
gradient_accumulation_steps: 1
max_seq_len: 512
num_epochs: 1
learning_rate_lora: 2.0e-4
learning_rate_embedding: 5.0e-5
val_steps_per_epoch: 1
output_dir: ./outputs/base_11b

dataset_name: ""
prompt_column: prompt
response_column: response
val_split_ratio: 0.05
apply_caesar_cipher: false
caesar_shift: 3

system_prompt: |
  You are a helpful assistant. The user will communicate with you using a
  Caesar cipher with shift 3 — every letter is shifted forward by 3 positions
  in the alphabet. Decode the user's request and respond in plain English.

testing_prompts: []

# ── Base model mode ──────────────────────────────────────────────────────────
base_model_only: true

# ── Benchmark suite selection ────────────────────────────────────────────────
run_hexphi: true
run_mmlu:   true
run_ifeval: true

# ── Shared generation settings ───────────────────────────────────────────────
benchmark_max_new_tokens: 512
benchmark_temperature: 0.0
benchmark_judge_model: gpt-4o
benchmark_judge_max_tokens: 512

# ── HEx-PHI settings ─────────────────────────────────────────────────────────
hexphi_dataset_name: LLM-Tuning-Safety/HEx-PHI
hexphi_per_category_limit: null

# ── MMLU settings ────────────────────────────────────────────────────────────
mmlu_subject: all
mmlu_num_samples: null    # all ~14k
mmlu_apply_cipher: false

# ── IFEval settings ──────────────────────────────────────────────────────────
ifeval_num_samples: null  # all 541
ifeval_apply_cipher: false

seed: 42
