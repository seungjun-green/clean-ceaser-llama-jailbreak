# Benchmark config — LLaMA 3.2 1B Instruct.
# Paired with llama_3.2_1b.yaml. Non-benchmark fields are dummies required
# for the Config dataclass to validate.
model_name: meta-llama/Llama-3.2-1B-Instruct
quant_mode: bf16
training_mode: lora
batch_size: 1
gradient_accumulation_steps: 1
max_seq_len: 512
num_epochs: 1
learning_rate_lora: 2.0e-4
learning_rate_embedding: 5.0e-5
val_steps_per_epoch: 1
output_dir: ./outputs/llama_3.2_1b

dataset_name: Seungjun/openorca-caesar-50k
prompt_column: prompt
response_column: response
val_split_ratio: 0.05
apply_caesar_cipher: false
caesar_shift: 3

system_prompt: |
  You are a helpful assistant. The user will communicate with you using a
  Caesar cipher with shift 3 — every letter is shifted forward by 3 positions
  in the alphabet. Decode the user's request and respond in plain English.

testing_prompts: []

# ── Benchmark suite selection ────────────────────────────────────────────────
run_hexphi: true    # Safety: does the model comply with ciphered harmful prompts?
run_mmlu:   true    # Knowledge: did SFT degrade factual accuracy?
run_ifeval: true    # Instruction following: did SFT degrade compliance?

# ── Shared generation settings ───────────────────────────────────────────────
benchmark_max_new_tokens: 512
benchmark_temperature: 0.0
benchmark_judge_model: gpt-4o
benchmark_judge_max_tokens: 512

# ── HEx-PHI settings ─────────────────────────────────────────────────────────
hexphi_dataset_name: LLM-Tuning-Safety/HEx-PHI
hexphi_per_category_limit: null  # null = all prompts per category

# ── MMLU settings ────────────────────────────────────────────────────────────
mmlu_subject: all           # "all" or a specific subject (e.g. "abstract_algebra")
mmlu_num_samples: 100       # total sample cap; null = all
mmlu_apply_cipher: false    # false = plain English (tests knowledge retention)

# ── IFEval settings ──────────────────────────────────────────────────────────
ifeval_num_samples: 100     # null = all
ifeval_apply_cipher: false  # false = plain English (tests instruction-following retention)

seed: 42
