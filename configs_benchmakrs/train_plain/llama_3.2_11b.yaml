# Benchmark — Fine-tuned LLaMA 3.2 11B Vision-Instruct (plain SFT) · Plain-English input
# Tests whether plain-SFT model retains safety / knowledge / instruction-following.
model_name: meta-llama/Llama-3.2-11B-Vision-Instruct
quant_mode: 4bit
training_mode: lora
batch_size: 1
gradient_accumulation_steps: 1
max_seq_len: 512
num_epochs: 1
learning_rate_lora: 2.0e-4
learning_rate_embedding: 5.0e-5
val_steps_per_epoch: 1
output_dir: ./outputs/plain_11b

dataset_name: Seungjun/openorca-50k
prompt_column: prompt
response_column: response
val_split_ratio: 0.05
apply_caesar_cipher: false    # plain-SFT model expects plain English input
caesar_shift: 3

system_prompt: |
  You are a helpful and concise assistant.

testing_prompts: []

base_model_only: false        # load fine-tuned checkpoint

# ── Benchmark suite selection ────────────────────────────────────────────────
run_hexphi: true
run_mmlu:   true
run_ifeval: true

# ── Shared generation settings ───────────────────────────────────────────────
benchmark_max_new_tokens: 512
benchmark_temperature: 0.0
benchmark_judge_model: gpt-4o
benchmark_judge_max_tokens: 512

# ── HEx-PHI settings ─────────────────────────────────────────────────────────
hexphi_dataset_name: LLM-Tuning-Safety/HEx-PHI
hexphi_per_category_limit: null

# ── MMLU settings ────────────────────────────────────────────────────────────
mmlu_subject: all
mmlu_num_samples: null        # all ~14k
mmlu_apply_cipher: false

# ── IFEval settings ──────────────────────────────────────────────────────────
ifeval_num_samples: null      # all 541
ifeval_apply_cipher: false

seed: 42
